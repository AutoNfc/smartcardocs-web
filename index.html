<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCarDocs Chile - Documentos Digitales</title>
    <style>
        /* Estilos ultra rápidos para carga en carretera con mala señal */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        h1 { font-size: 24px; margin-bottom: 5px; color: #38bdf8; }
        .patente {
            font-size: 22px;
            font-weight: bold;
            background: #fef08a;
            color: #1e293b;
            padding: 5px 15px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 25px;
            border: 2px solid #eab308;
            letter-spacing: 1px;
        }
        .btn {
            display: block;
            background: #0284c7;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn:hover { background: #0369a1; }
        .btn.disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .loading { font-size: 16px; color: #94a3b8; }
        .error { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="loader" class="loading">Cargando documentos del vehículo...</div>
    <div id="content" style="display: none;">
        <h1>SmartCarDocs</h1>
        <div class="patente" id="txt-patente">-</div>
        
        <a href="#" id="btn-soap" class="btn" target="_blank">📄 Seguro Obligatorio (SOAP)</a>
        <a href="#" id="btn-revision" class="btn" target="_blank">🔍 Revisión Técnica</a>
        <a href="#" id="btn-permiso" class="btn" target="_blank">🚗 Permiso de Circulación</a>
    </div>
</div>

<script>
    // Configuración secreta de tu proyecto en Supabase
    const SUPABASE_URL = "https://ofeqicztagixejyqvuof.supabase.co";
    // Tu API Key pública (Anon Key) la usaremos en el próximo paso de forma segura
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZXFpY3p0YWdpeGVqeXF2dW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzcxMjAsImV4cCI6MjA5ODYxMzEyMH0.mMGzCSy2lCU-8hGMPblVCsY4YWtKldfP0CBCCaAolmQ"; 

    // Capturar la patente directamente desde el enlace (Ej: /?p=KFJP62)
    const urlParams = new URLSearchParams(window.location.search);
    const patente = urlParams.get('p') ? urlParams.get('p').toUpperCase() : null;

    const loader = document.getElementById('loader');
    const content = document.getElementById('content');

    if (!patente) {
        loader.className = "error";
        loader.innerText = "Error: No se escaneó ninguna patente válida.";
    } else {
        // Viajar a Supabase a buscar los links de los PDFs de esta patente
        fetch(`${SUPABASE_URL}/rest/v1/vehiculos?patente=eq.${patente}`, {
            method: 'GET',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        })
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) {
                loader.className = "error";
                loader.innerText = `Vehículo con patente ${patente} no registrado.`;
                return;
            }

            const vehiculo = data[0];
            document.getElementById('txt-patente').innerText = patente;

            // Asignar las URLs reales de los PDFs a los botones
            configurarBoton('btn-soap', vehiculo.url_soap);
            configurarBoton('btn-revision', vehiculo.url_revision);
            configurarBoton('btn-permiso', vehiculo.url_permiso);

            loader.style.display = 'none';
            content.style.display = 'block';
        })
        .catch(err => {
            loader.className = "error";
            loader.innerText = "Error de conexión al obtener los documentos.";
            console.error(err);
        });
    }

    function configurarBoton(id, url) {
        const btn = document.getElementById(id);
        if (url) {
            btn.href = url;
        } else {
            btn.className = "btn disabled";
            btn.innerText += " (No disponible)";
            btn.addEventListener('click', (e) => e.preventDefault());
        }
    }
</script>

</body>
</html>
