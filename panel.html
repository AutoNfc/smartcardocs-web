<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - SmartCarDocs</title>
    <style>
        body {
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel-container {
            background: linear-gradient(145deg, #141416, #1a1a1e);
            border: 1px solid #2d2d34;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 24px; margin-bottom: 5px; color: #ffffff; font-weight: 600; }
        .subtitle { color: #8a8a93; font-size: 14px; margin-bottom: 25px; }
        .info-box {
            background-color: #111112;
            border: 1px solid #232329;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .info-row:last-child { margin-bottom: 0; }
        .label { color: #666670; }
        .value { font-weight: bold; color: #ffffff; }
        
        /* Estilos para las secciones de documentos independientes */
        .doc-section {
            background: #111112;
            border: 1px solid #232329;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .doc-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .doc-header input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: #ff4a4a;
        }
        .doc-title { font-size: 14px; font-weight: bold; color: #e4e4e7; }
        
        .doc-body { display: none; margin-top: 10px; }
        
        label { display: block; font-size: 12px; color: #8a8a93; margin-bottom: 5px; margin-top: 10px; }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #161618;
            border: 1px dashed #3a3a44;
            border-radius: 8px;
            color: #8a8a93;
            box-sizing: border-box;
        }
        input[type="date"] {
            width: 100%;
            padding: 10px;
            background: #161618;
            border: 1px solid #3a3a44;
            border-radius: 8px;
            color: #ffffff;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        button:hover { background-color: #e4e4e7; }
        .footer { text-align: center; color: #44444a; font-size: 11px; margin-top: 25px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="pantalla-carga">
        <p style="color: #8a8a93; font-size: 15px;">Validando credenciales seguras...</p>
    </div>

    <div id="contenedor-panel" class="panel-container" style="display: none;">
        <h1>Mi SmartCarDocs</h1>
        <p class="subtitle">Selecciona los documentos vencidos que deseas actualizar.</p>

        <div class="info-box">
            <div class="info-row">
                <span class="label">Propietario:</span>
                <span id="txt-cliente" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">Patente:</span>
                <span id="txt-patente" class="value">-</span>
            </div>
        </div>

        <form id="form-actualizar">
            
            <div class="doc-section">
                <div class="doc-header" onclick="toggleDocumento('rev')">
                    <input type="checkbox" id="chk-rev" onchange="actualizarEstadoDoc('rev')">
                    <span class="doc-title">Actualizar Revisión Técnica</span>
                </div>
                <div id="body-rev" class="doc-body">
                    <label>Nuevo archivo PDF</label>
                    <input type="file" id="file-revision" accept="application/pdf">
                    <label>Nueva Fecha de Vencimiento</label>
                    <input type="date" id="date-revision">
                </div>
            </div>

            <div class="doc-section">
                <div class="doc-header" onclick="toggleDocumento('soap')">
                    <input type="checkbox" id="chk-soap" onchange="actualizarEstadoDoc('soap')">
                    <span class="doc-title">Actualizar SOAP</span>
                </div>
                <div id="body-soap" class="doc-body">
                    <label>Nuevo archivo PDF</label>
                    <input type="file" id="file-soap" accept="application/pdf">
                    <label>Nueva Fecha de Vencimiento</label>
                    <input type="date" id="date-soap">
                </div>
            </div>

            <div class="doc-section">
                <div class="doc-header" onclick="toggleDocumento('permiso')">
                    <input type="checkbox" id="chk-permiso" onchange="actualizarEstadoDoc('permiso')">
                    <span class="doc-title">Actualizar Permiso de Circulación</span>
                </div>
                <div id="body-permiso" class="doc-body">
                    <label>Nuevo archivo PDF</label>
                    <input type="file" id="file-permiso" accept="application/pdf">
                    <label>Nueva Fecha de Vencimiento</label>
                    <input type="date" id="date-permiso">
                </div>
            </div>

            <button type="submit">Guardar Cambios Seleccionados</button>
        </form>

        <p class="footer">SMARTCARDOCS CHILE • PANEL PRIVADO</p>
    </div>

    <script>
        const SUPABASE_URL = "https://ofeqicztagixejyqvuof.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZXFpY3p0YWdpeGVqeXF2dW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzcxMjAsImV4cCI6MjA5ODYxMzEyMH0.mMGzCSy2lCU-8hGMPblVCsY4YWtKldfP0CBCCaAolmQ";

        const urlParams = new URLSearchParams(window.location.search);
        const idUrl = urlParams.get('id');

        // Funciones visuales para abrir y cerrar secciones dinámicamente
        function toggleDocumento(tipo) {
            // Previene que se dispare doble si hacen clic directo en el cuadradito checkbox
            if (event.target.type === 'checkbox') return;
            const checkbox = document.getElementById(`chk-${tipo}`);
            checkbox.checked = !checkbox.checked;
            actualizarEstadoDoc(tipo);
        }

        function actualizarEstadoDoc(tipo) {
            const checkbox = document.getElementById(`chk-${tipo}`);
            const body = document.getElementById(`body-${`body-${tipo}` ? tipo : ''}`);
            const inputFile = document.getElementById(`file-${tipo === 'rev' ? 'revision' : tipo}`);
            const inputDate = document.getElementById(`date-${tipo === 'rev' ? 'revision' : tipo}`);
            
            if (checkbox.checked) {
                body.style.display = 'block';
                inputFile.required = true;
                inputDate.required = true;
            } else {
                body.style.display = 'none';
                inputFile.required = false;
                inputFile.value = '';
                inputDate.required = false;
                inputDate.value = '';
            }
        }

        if (idUrl) {
            fetch(`${SUPABASE_URL}/rest/v1/vehiculos?codigo_seguro=eq.${idUrl}`, {
                method: 'GET',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            })
            .then(res => res.json())
            .then(data => {
                if (data && data.length > 0) {
                    const vehiculo = data[0];

                    if (vehiculo.estado_cuenta !== "A") {
                        mostrarError("Acceso Denegado", "Tu cuenta debe estar Activa para gestionar documentos.");
                    } else {
                        document.getElementById('pantalla-carga').style.display = 'none';
                        document.getElementById('contenedor-panel').style.display = 'block';
                        
                        document.getElementById('txt-cliente').innerText = vehiculo.nombre_cliente || "Propietario";
                        document.getElementById('txt-patente').innerText = vehiculo.patente || "- - - -";
                    }
                } else {
                    mostrarError("Firma Inválida", "Las credenciales no existen en nuestros registros.");
                }
            })
            .catch(err => {
                console.error(err);
                mostrarError("Error de Conexión", "No pudimos conectar con la base de datos.");
            });
        } else {
            mostrarError("Enlace Incompleto", "Para entrar al panel necesitas usar el link privado enviado a tu WhatsApp.");
        }

        function mostrarError(titulo, mensaje) {
            document.body.innerHTML = `
                <div style="background: linear-gradient(145deg, #141416, #1a1a1e); border: 1px solid #ff4a4a; border-radius: 20px; padding: 35px 25px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: sans-serif;">
                    <h2 style="color: #ff4a4a; font-size: 22px; margin: 0 0 15px 0;">${titulo}</h2>
                    <p style="color: #8a8a93; font-size: 14px; line-height: 1.6; margin: 0;">${mensaje}</p>
                </div>
            `;
        }

        document.getElementById('form-actualizar').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validar que al menos haya seleccionado uno
            const chkRev = document.getElementById('chk-rev').checked;
            const chkSoap = document.getElementById('chk-soap').checked;
            const chkPermiso = document.getElementById('chk-permiso').checked;
            
            // PEGA ESTE CÓDIGO DEFINITIVO EN SU LUGAR:
if(!chkRev && !chkSoap && !chkPermiso) {
    alert("⚠️ Por favor, selecciona al menos un documento para actualizar.");
    return;
}

// 1. Agarramos el texto de la patente que Supabase ya cargó en tu pantalla
const patenteVehiculo = document.getElementById('txt-patente').innerText;

// 2. Creamos la caja FormData para meter los archivos reales
const formData = new FormData();
formData.append('patente', patenteVehiculo);

// Si marcó Revisión Técnica, adjuntamos el archivo y su fecha
if (chkRev) {
    formData.append('revision_tecnica', document.getElementById('file-revision').files[0]);
    formData.append('fecha_revision', document.getElementById('date-revision').value);
}
// Si marcó SOAP, adjuntamos el archivo y su fecha
if (chkSoap) {
    formData.append('soap', document.getElementById('file-soap').files[0]);
    formData.append('fecha_soap', document.getElementById('date-soap').value);
}
// Si marcó Permiso, adjuntamos el archivo y su fecha
if (chkPermiso) {
    formData.append('permiso_circulacion', document.getElementById('file-permiso').files[0]);
    formData.append('fecha_permiso', document.getElementById('date-permiso').value);
}

alert("⏳ Subiendo documentos y guardando cambios, por favor espere...");

// 3. Disparamos directo a tu Webhook Real de Make
fetch('https://hook.us2.make.com/99p1ejgh4nkgoh6tb0sqiijf3ilcgj49', {
    method: 'POST',
    body: formData
})
.then(res => {
    if(res.ok) {
        alert("✅ ¡Éxito! Tus documentos se han actualizado correctamente.");
        location.reload(); // Recarga la pantalla para mostrar los cambios
    } else {
        alert("❌ Error en el servidor al intentar subir los archivos.");
    }
})
.catch(err => {
    console.error(err);
    alert("⚠️ Hubo un problema de conexión al enviar los datos.");
});
});
    </script>
</body>
</html>
