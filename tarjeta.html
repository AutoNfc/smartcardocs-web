<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Bloqueo de zoom para una experiencia nativa de app -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexuz Chile - Documentos Digitales</title>
    <!-- Le dice al navegador que pinte la barra de estado de este color -->
    <meta name="theme-color" content="#11222F">
    <!-- Optimizaciones para iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="robots" content="noindex, nofollow">

    <meta property="og:title" content="Nexuz Chile - Credencial Activa">
    <meta property="og:description" content="Acceso seguro a los documentos digitales de este vehículo.">
    <meta property="og:image" content="https://i.ibb.co/jvPt0sTd/Logo-Nexuz.png">
    <meta property="og:type" content="website">
    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="img/logo.svg">
    
    <!-- FUENTES: Inter, Teko, Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@600&family=Teko:wght@300&display=swap" rel="stylesheet">
    
    <style>
        /* RESET & BASE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fafafa;
            /* Fuerza a no tener scroll y ocupar el tamaño de la pantalla del teléfono */
            min-height: 100dvh;
            overflow-x: hidden; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================================
           CABECERA (FONDO CURVO Y LOGO)
           ========================================= */
        .header-curve {
            background-color: #11222F;
            width: 100%;
            height: 25vh;
            /* Crea la curvatura inferior */
            border-bottom-left-radius: 50% 60%;
            border-bottom-right-radius: 50% 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2vh;
            flex-shrink: 0;
            padding-top: env(safe-area-inset-top); 
    height: calc(25vh + env(safe-area-inset-top));
        }

        .header-curve img {
            height: 45%; /* Ajusta el tamaño del logo superior aquí */
            max-width: 80%;
            margin-top: 0px;
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 25px;
            flex-grow: 1;
        }

        /* NOMBRE DE USUARIO */
        .welcome {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: #00B4D8;
            font-size: 1.3rem;
            margin-top: 2vh;
            margin-bottom: 3vh;
            text-align: center;
        }

        /* =========================================
           ZONA PATENTE
           ========================================= */
        .patente-box {
            background-image: url('img/tarjeta/fondo-patente.svg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            width: 260px;
            height: 100px;
            display: flex;
            justify-content: center;
            margin-bottom: 4vh;
            flex-shrink: 0;
        }

        /* 🎛️ CONTROL VERTICAL: Sube o baja los textos respecto al fondo */
        .patente-wrapper-vertical {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -5px; /* <-- Modifica esto para subir (negativo) o bajar (positivo) */
        }

        /* FUENTE PATENTE (Teko Light) */
        .par-letras, .par-numeros {
            font-family: 'Teko', sans-serif;
            font-weight: 300;
            font-size: 75px;
            color: #111827;
            line-height: 1;
            letter-spacing: 3px;
        }

        /* 🎛️ CONTROLES HORIZONTALES: Ajusta la separación entre los pares */
        #par1 {
            margin-right: 20px; 
            margin-left: 0px;
        }
        #par2 {
            margin-right: 20px; 
            margin-left: 0px;
        }
        #par3 {
            margin-left: 10px;   
        }

        /* =========================================
           BOTONES DE DOCUMENTOS
           ========================================= */
        .buttons-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 3.5vh;
            margin-top: 1vh;
            margin-bottom: 3vh;
        }

        .btn {
            background-color: #11222F;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 20px 20px; 
            text-decoration: none;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            
            /* 👇 Transición un poco más rápida para que no se sienta lenta */
            transition: all 0.3s ease;
            -webkit-transition: all 0.3s ease;
        }


        /* 👇 Esta regla evita que se quede pegado en el teléfono. Solo funciona en PC con mouse */
        @media (hover: hover) {
            .btn:hover {
                box-shadow: 0 0 15px rgba(17, 34, 47, 0.4); 
                /* Se agranda solo un 2% en lugar de 10% (mucho más elegante) */
                transform: scale(1.02); 
            }
        }

        /* 👇 El efecto real al presionar con el dedo */
        .btn:active {
            /* Transición rapidísima al presionar */
            transition: all 0.1s;
            -webkit-transition: all 0.1s;
            box-shadow: none;
            /* Se encoge ligeramente hacia adentro */
            transform: scale(0.97); 
            /* Se oscurece un pelín para dar sensación de profundidad */
            background-color: #0c1822; 
        }

        /* Icono SVG a la izquierda */
        .btn-icon {
            width: 26px;
            height: 26px;
            margin-right: 15px;
        }

        /* Texto centrado a la izquierda con ajuste universal */
        .btn-text {
            flex-grow: 1;
            text-align: left;
            
            /* 👇 LA MAGIA UNIVERSAL: clamp(Mínimo, Ideal adaptativo, Máximo) */
            font-size: clamp(0.75rem, 3.5vw, 0.95rem); 
            
            /* 👇 Prohíbe absolutamente que el texto salte a una segunda línea */
            white-space: nowrap; 
            overflow: hidden;
            
            /* Si la pantalla es extremadamente enana, pondrá "..." en vez de desarmar el botón */
            text-overflow: ellipsis; 
        }

        /* =========================================
           CIRCULOS DE ESTADO MINIMALISTAS
           ========================================= */
        .badge {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            margin-left: auto;
        }

        .badge-vigente {
            background-color: #10B981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }

        .badge-alerta {
            background-color: #F59E0B;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
        }

        .badge-vencido {
            background-color: #EF4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
        }

        /* =========================================
           POPUP DE ALERTA FLOTANTE
           ========================================= */
        #popup-vencimiento {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100dvh;
            background-color: rgba(17, 34, 47, 0.85); /* Fondo oscuro semitransparente */
            display: none; /* Oculto por defecto */
            align-items: center; justify-content: center;
            z-index: 10000; /* Por encima de toda la app */
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .popup-box {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .popup-box h3 {
            font-family: 'Poppins', sans-serif;
            color: #D97706;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .popup-box p {
            font-family: 'Inter', sans-serif;
            color: #4b5563;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .popup-btn {
            background-color: #D97706;
            color: #ffffff;
            border: none;
            padding: 14px 0;
            width: 100%;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        /* =========================================
           FOOTER
           ========================================= */
        .footer {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 10px;
            color: #4b5563;
            text-align: center;
            line-height: 1.5;
            margin-top: auto;
            margin-bottom: 3vh;
            width: 100%;
    padding: 0 15px;
        }

    /* =========================================
           PANTALLA DE CARGA (ANTI-FLICKER)
           ========================================= */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            background-color: #fafafa; /* Mismo fondo de la app */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(17, 34, 47, 0.1);
            border-top: 4px solid #11222F; /* Tu azul oscuro */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ocultamos el contenedor principal por defecto para que no parpadee */
        .container {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <div id="popup-vencimiento">
        <div class="popup-box" id="popup-caja">
            <h3>⚠️ Alerta de Ruta</h3>
            <p id="popup-mensaje">Tienes documentos próximos a vencer.</p>
            <button class="popup-btn" onclick="cerrarPopup()">Entendido</button>
        </div>
    </div>


    <!-- FONDO CURVO SUPERIOR -->
    <div class="header-curve">
        <!-- Reemplaza con tu logo SVG -->
        <img src="img/logo.svg" alt="Nexuz Logo">
    </div>

    <div class="container">
        
        <!-- NOMBRE INTER BOLD -->
        <div class="welcome" id="client-name">Cargando...</div>
        
        <!-- PATENTE TEKO LIGHT (Separada en 3 bloques) -->
        <div class="patente-box">
            <div class="patente-wrapper-vertical" id="patente-posicion-vertical">
                <span class="par-letras" id="par1">- -</span>
                <span class="par-letras" id="par2">- -</span>
                <span class="par-numeros" id="par3">- -</span>
            </div>
        </div>

        <!-- BOTONES POPPINS SEMI BOLD (Mismo orden que en tu imagen) -->
        <div class="buttons-container">
            <a href="#" id="link-permiso" class="btn" target="_blank" rel="noopener noreferrer">
                <img src="img/tarjeta/Icono Permiso Circulacion.svg" class="btn-icon" alt="Permiso">
                <span class="btn-text">Permiso de Circulación</span>
            </a>
            
            <a href="#" id="link-revision" class="btn" target="_blank" rel="noopener noreferrer">
                <img src="img/tarjeta/Icono Revision.svg" class="btn-icon" alt="Revisión">
                <span class="btn-text">Revisión Técnica</span>
            </a>
            
            <a href="#" id="link-soap" class="btn" target="_blank" rel="noopener noreferrer">
                <img src="img/tarjeta/Icono Soap.svg" class="btn-icon" alt="SOAP">
                <span class="btn-text">Seguro Obligatorio (SOAP)</span>
            </a>
        </div>

        <!-- FOOTER INTER REGULAR -->
        <div class="footer">
            Información protegida | Validez Ley N° 19.799<br>
            MyNexuz.cl © 2026
        </div>
    </div>

   <script>

    function cerrarPopup() {
        const popup = document.getElementById('popup-vencimiento');
        const caja = document.getElementById('popup-caja');
        popup.style.opacity = '0';
        caja.style.transform = 'scale(0.9)';
        setTimeout(() => { popup.style.display = 'none'; }, 300);
    }

    // Función para ocultar el cargador y revelar la app con suavidad
    function quitarCargador() {
        const loader = document.getElementById('loading-screen');
        const container = document.querySelector('.container');
        
        if (loader) {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
        }
        if (container) {
            container.style.opacity = '1';
        }
    }
    // ==========================================
    // LOGICA SUPABASE INTACTA
    // ==========================================
    const SUPABASE_URL = "https://ofeqicztagixejyqvuof.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZXFpY3p0YWdpeGVqeXF2dW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzcxMjAsImV4cCI6MjA5ODYxMzEyMH0.mMGzCSy2lCU-8hGMPblVCsY4YWtKldfP0CBCCaAolmQ";

    const urlParams = new URLSearchParams(window.location.search);
    const idUrl = urlParams.get('id');

    if (idUrl) {
        // 1. Iniciamos un "reloj de arena" de 9 segundos
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 9000);

        const idSanitizado = encodeURIComponent(idUrl);

        // Llamamos a la función RPC segura de Supabase pasando el UUID como parámetro limpio
        fetch(`${SUPABASE_URL}/rest/v1/rpc/obtener_vehiculo_publico`, {
            method: 'POST', // Las funciones RPC de Supabase se llaman siempre con POST
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({ id_tarjeta: idUrl }), // Enviamos el UUID de forma directa y estructurada
            signal: controller.signal
        })
        .then(response => {
            // 3. Si el servidor responde a tiempo, cancelamos la cuenta regresiva
            clearTimeout(timeoutId);
            return response.json();
        })
        .then(data => {
            if (data && data.length > 0) {
                const vehiculo = data[0];
                
                if (vehiculo.estado_cuenta === "P") {
                    // Limpiamos la patente de símbolos extraños por seguridad antes de imprimirla en el error
                    const patenteSegura = (vehiculo.patente || "------").replace(/[^a-zA-Z0-9]/g, "");
                    mostrarPantallaError("⏳ Tarjeta en Proceso", `El vehículo con patente ${patenteSegura} se registró con éxito, pero está en proceso de activación por el administrador.`);
                } else {
                    document.getElementById('client-name').innerText = vehiculo.nombre_cliente || "Propietario";
                    
                    const patenteLimpia = (vehiculo.patente || "------").replace(/[^a-zA-Z0-9]/g, ""); 

                    document.getElementById('par1').innerText = patenteLimpia.substring(0, 2); 
                    document.getElementById('par2').innerText = patenteLimpia.substring(2, 4); 
                    document.getElementById('par3').innerText = patenteLimpia.substring(4, 6); 
                    
                    // Lista silenciosa para el popup
                    let documentosPorVencer = [];

                    function aplicarEstado(btnId, urlPdf, fechaVencimiento, nombreDocumento) {
                        const btn = document.getElementById(btnId);
                        
                        if(urlPdf) {
                            btn.href = urlPdf; 
                            
                            if(fechaVencimiento) {
                                const hoy = new Date(); 
                                const fechaVen = new Date(fechaVencimiento + "T23:59:59"); 
                                
                                const diferenciaTiempo = fechaVen - hoy;
                                const diasRestantes = Math.ceil(diferenciaTiempo / (1000 * 60 * 60 * 24));
                                
                                const spanEstado = document.createElement('span');
                                spanEstado.className = 'badge'; // Solo el punto minimalista

                                if (diasRestantes < 0) {
                                    spanEstado.classList.add('badge-vencido'); // Punto Rojo
                                    btn.style.border = "1px solid #EF4444"; 
                                } else if (diasRestantes <= 15) {
                                    spanEstado.classList.add('badge-alerta'); // Punto Amarillo
                                    btn.style.border = "1px solid #F59E0B";
                                    documentosPorVencer.push(`${nombreDocumento} (en ${diasRestantes} días)`);
                                } else {
                                    spanEstado.classList.add('badge-vigente'); // Punto Verde
                                }
                                
                                btn.appendChild(spanEstado);
                            }
                        } else {
                            btn.style.display = 'none'; 
                        }
                    }

                    // 1. Aplicamos los estados a los botones
                    aplicarEstado('link-revision', vehiculo.url_revision, vehiculo.vencimiento_revision, "Revisión Técnica");
                    aplicarEstado('link-soap', vehiculo.url_soap, vehiculo.vencimiento_soap, "SOAP");
                    aplicarEstado('link-permiso', vehiculo.url_permiso, vehiculo.vencimiento_permiso, "Permiso");
                    
                    // 2. Quitamos el cargador principal
                    quitarCargador();

                    // 3. Si hay alertas, disparamos el Popup Flotante
                    if (documentosPorVencer.length > 0) {
                        const popup = document.getElementById('popup-vencimiento');
                        const caja = document.getElementById('popup-caja');
                        const mensaje = document.getElementById('popup-mensaje');
                        
                        // 🧠 Lógica inteligente para singular o plural
                        if (documentosPorVencer.length === 1) {
                            mensaje.innerText = "Tu " + documentosPorVencer[0] + " vencerá pronto. Recuerda renovarlo para evitar multas.";
                        } else {
                            mensaje.innerText = "Tu " + documentosPorVencer.join(" y tu ") + " vencerán pronto. Recuerda renovarlos para evitar multas.";
                        }

                        // Mostramos el popup con un suave efecto de entrada
                        popup.style.display = 'flex';
                        setTimeout(() => {
                            popup.style.opacity = '1';
                            caja.style.transform = 'scale(1)';
                        }, 50);
                    }
                }
            } else {
                mostrarPantallaError("🔒 Acceso Denegado", "Esta tarjeta no contiene una firma digital válida en nuestros registros.");
            }
        })
        .catch(error => {
            // 4. Si falla por cualquier motivo, limpiamos el reloj primero
            clearTimeout(timeoutId);
            console.error("Error:", error);
            
            // 5. Diferenciamos si fue por falta de internet/timeout o un error del servidor
            if (error.name === 'AbortError' || !navigator.onLine) {
                mostrarPantallaError("⚠️ Error de Conexión", "La señal de internet es muy débil o estás desconectado. Por favor reintenta.");
            } else {
                mostrarPantallaError("⚠️ Error de Servidor", "No pudimos conectar con el servidor seguro de Nexuz.");
            }
        });
    } else {
        mostrarPantallaError("❌ Acceso Inválido", "No se detectó ninguna credencial digital. Escanea una tarjeta válida.");
    }

    // Función que limpia la pantalla y muestra el escudo de seguridad con diseño Premium
    function mostrarPantallaError(titulo, mensaje) {
        quitarCargador();
        // Detectamos si el mensaje es de Error/Denegado o de Pendiente para cambiar los colores
        const esError = titulo.toLowerCase().includes("denegado") || titulo.toLowerCase().includes("error") || titulo.toLowerCase().includes("inválido");
        
        const colorTema = esError ? "#EF4444" : "#F59E0B"; // Rojo para error, Naranja para pendiente
        const colorFondoIcono = esError ? "rgba(239, 68, 68, 0.15)" : "rgba(245, 158, 11, 0.15)";
        
        // Limpiamos los emojis del título porque ahora pondremos un ícono gigante arriba
        const tituloLimpio = titulo.replace(/🔒|⏳|⚠️|❌/g, '').trim();
        const icono = esError ? '🔒' : '⏳';

        document.body.innerHTML = `
            <div style="background-color: #11222F; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; width: 100%;">
                
                <div style="background: #1a2c3a; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 40px 25px; text-align: center; max-width: 360px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 20px ${colorFondoIcono};">
                    
                    <div style="background-color: ${colorFondoIcono}; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 32px; border: 1px solid ${colorTema};">
                        ${icono}
                    </div>

                    <h2 style="color: #ffffff; font-family: 'Poppins', sans-serif; font-size: 22px; margin: 0 0 12px 0; font-weight: 600;">
                        ${tituloLimpio}
                    </h2>
                    
                    <p style="color: #9ca3af; font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6; margin: 0 0 30px 0; font-weight: 400;">
                        ${mensaje}
                    </p>
                    
                    <a href="javascript:window.location.reload();" style="display: inline-block; background-color: ${colorTema}; color: #ffffff; text-decoration: none; padding: 14px 30px; border-radius: 30px; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; transition: transform 0.2s, opacity 0.2s; box-shadow: 0 4px 15px ${colorFondoIcono};" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'" ontouchstart="this.style.transform='scale(0.95)'" ontouchend="this.style.transform='scale(1)'">
                        Actualizar Pantalla
                    </a>
                </div>

                <div style="margin-top: 4vh; color: #6b7280; font-family: 'Inter', sans-serif; font-size: 11px; text-align: center; letter-spacing: 0.5px; line-height: 1.5;">
                    MyNexuz.cl<br>Informacion Protegida
                </div>
            </div>
        `;
    }
</script>
    
</body>
</html>
